<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow">
  <title>Erhan Paneli</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{--gold:#c9a84c;--cream:#f5f0e8;--dark:#0e0c09;--dark2:#1a1710;--dark3:#231f18;--text:#d4cfc4;--text-dim:#7a7468}
    *{box-sizing:border-box;margin:0;padding:0} body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif}
    .container{max-width:1240px;margin:0 auto;padding:28px 24px 60px}
    .top{display:flex;justify-content:space-between;gap:18px;align-items:flex-end;flex-wrap:wrap;margin-bottom:24px}
    h1{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:56px;color:var(--cream)} .sub{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-top:8px}
    .actions{display:flex;gap:10px;flex-wrap:wrap} button,a{padding:12px 16px;border:none;text-decoration:none;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer}
    .btn-main{background:var(--gold);color:var(--dark)} .btn-ghost{background:transparent;border:1px solid rgba(201,168,76,.25);color:var(--text-dim)}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
    .stat{background:var(--dark2);border:1px solid rgba(201,168,76,.12);padding:18px}.stat small{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px}
    .stat strong{font-family:'Cormorant Garamond',serif;font-size:40px;color:var(--gold);font-weight:300}
    .table-wrap{overflow:auto;border:1px solid rgba(201,168,76,.12)} table{width:100%;min-width:960px;border-collapse:collapse;background:var(--dark2)} th,td{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.05);text-align:left;font-size:13px;vertical-align:top}
    th{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold)} .badge{display:inline-block;padding:7px 10px;border:1px solid rgba(201,168,76,.25);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--gold)}
    .row-actions{display:flex;gap:8px;flex-wrap:wrap}.empty{padding:30px;text-align:center;background:var(--dark2);border:1px dashed rgba(201,168,76,.2);color:var(--text-dim)}
    .msg{margin-top:14px;min-height:20px;color:var(--gold)}
    @media (max-width:900px){.stats{grid-template-columns:1fr 1fr}} @media (max-width:600px){.stats{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="container">
    <div class="top">
      <div>
        <h1>Erhan Paneli</h1>
        <p class="sub">Müşteri sitesinden gelen tüm randevular burada</p>
      </div>
      <div class="actions">
        <a href="/" class="btn-ghost">Müşteri Sitesi</a>
        <button class="btn-ghost" id="refreshBtn">Yenile</button>
        <button class="btn-main" id="clearBtn">Tümünü Temizle</button>
        <button class="btn-ghost" id="logoutBtn">Çıkış Yap</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><small>Toplam Randevu</small><strong id="statTotal">0</strong></div>
      <div class="stat"><small>Bugün</small><strong id="statToday">0</strong></div>
      <div class="stat"><small>Yaklaşan</small><strong id="statUpcoming">0</strong></div>
      <div class="stat"><small>Hizmet Çeşidi</small><strong id="statServices">0</strong></div>
    </div>

    <div id="appointmentsBox" class="empty">Yükleniyor...</div>
    <div class="msg" id="message"></div>
  </div>
<script>
  function setMessage(text) { document.getElementById('message').textContent = text || ''; }
  function formatDate(dateStr) {
    if (!dateStr) return '-';
    return new Date(dateStr + 'T00:00:00').toLocaleDateString('tr-TR');
  }
  function formatDateTime(dateTime) {
    if (!dateTime) return '-';
    return new Date(dateTime).toLocaleString('tr-TR');
  }

  async function loadAppointments() {
    setMessage('');
    const res = await fetch('/admin/api/appointments');
    if (res.status === 401 || res.redirected) {
      window.location.href = '/erhan-giris';
      return;
    }
    const data = await res.json();
    document.getElementById('statTotal').textContent = data.stats.total;
    document.getElementById('statToday').textContent = data.stats.today;
    document.getElementById('statUpcoming').textContent = data.stats.upcoming;
    document.getElementById('statServices').textContent = data.stats.services;

    const box = document.getElementById('appointmentsBox');
    if (!data.appointments.length) {
      box.className = 'empty';
      box.innerHTML = 'Henüz randevu yok. Müşteri formundan kayıt oluştuğunda burada listelenecek.';
      return;
    }

    box.className = 'table-wrap';
    box.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Müşteri</th>
            <th>Telefon</th>
            <th>Tarih</th>
            <th>Saat</th>
            <th>Hizmet</th>
            <th>Not</th>
            <th>Durum</th>
            <th>Oluşturma</th>
            <th>İşlem</th>
          </tr>
        </thead>
        <tbody>
          ${data.appointments.map(item => `
            <tr>
              <td>${item.name}</td>
              <td><a style="color:#f5f0e8;text-decoration:none" href="tel:${item.phone}">${item.phone}</a></td>
              <td>${formatDate(item.date)}</td>
              <td>${item.time}</td>
              <td>${item.service}</td>
              <td>${item.note || '-'}</td>
              <td><span class="badge">${item.status}</span></td>
              <td>${formatDateTime(item.created_at)}</td>
              <td>
                <div class="row-actions">
                  <button class="btn-ghost" onclick="toggleStatus(${item.id})">Durum</button>
                  <button class="btn-ghost" onclick="deleteAppointment(${item.id})">Sil</button>
                </div>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  }

  async function toggleStatus(id) {
    const res = await fetch(`/admin/api/appointments/${id}/toggle-status`, { method: 'POST' });
    const data = await res.json();
    setMessage(data.message || 'Durum güncellendi.');
    loadAppointments();
  }

  async function deleteAppointment(id) {
    const res = await fetch(`/admin/api/appointments/${id}`, { method: 'DELETE' });
    const data = await res.json();
    setMessage(data.message || 'Randevu silindi.');
    loadAppointments();
  }

  document.getElementById('refreshBtn').addEventListener('click', loadAppointments);
  document.getElementById('clearBtn').addEventListener('click', async () => {
    if (!confirm('Tüm randevuları silmek istediğine emin misin?')) return;
    const res = await fetch('/admin/api/appointments', { method: 'DELETE' });
    const data = await res.json();
    setMessage(data.message || 'Temizlendi.');
    loadAppointments();
  });
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    const res = await fetch('/admin/logout', { method: 'POST' });
    const data = await res.json();
    window.location.href = data.redirect || '/erhan-giris';
  });

  loadAppointments();
</script>
</body>
</html>
